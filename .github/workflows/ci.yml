name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts
        run: npm run compile

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test
        env:
          ALCHEMY_MAINNET_URL: ${{ secrets.ALCHEMY_MAINNET_URL }}

      - name: Run coverage
        run: npm run coverage
        env:
          ALCHEMY_MAINNET_URL: ${{ secrets.ALCHEMY_MAINNET_URL }}

      - name: Check contract sizes
        run: npm run size

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  lint-solidity:
    name: Solidity Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run solhint
        run: npm run lint
